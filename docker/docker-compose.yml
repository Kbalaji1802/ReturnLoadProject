# Local development stack for ReturnLoad (03_TECHNICAL_BIBLE.md §8: "Local — Docker
# Compose"). Brings up PostgreSQL (with PostGIS for future geo/lane matching) and
# the API. Copy .env.example to .env before running: `docker compose up --build`.
name: returnload

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: returnload-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-returnload}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-returnload}
      POSTGRES_DB: ${POSTGRES_DB:-returnload}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-returnload} -d ${POSTGRES_DB:-returnload}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: returnload-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      # Env vars override appsettings — the app talks to the compose network host `postgres`.
      ConnectionStrings__ReturnLoadDatabase: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-returnload};Username=${POSTGRES_USER:-returnload};Password=${POSTGRES_PASSWORD:-returnload}"
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-}
    ports:
      - "${API_PORT:-8080}:8080"

volumes:
  postgres-data:
