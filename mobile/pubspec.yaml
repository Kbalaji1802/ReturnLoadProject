name: returnload_mobile
description: "ReturnLoad driver mobile app — fill the empty return leg."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management (03_TECHNICAL_BIBLE.md — mobile stack).
  flutter_riverpod: ^2.6.1

  # Declarative routing.
  go_router: ^14.8.1

  # Networking.
  dio: ^5.7.0

  # Maps via OpenStreetMap tiles.
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Encrypted-at-rest local storage for tokens/sensitive cache
  # (OFFLINE_STRATEGY.md §3, 01_PROJECT_RULES.md §5).
  flutter_secure_storage: ^9.2.2

  # Premium UI: Inter typography, loading shimmer, document capture.
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
