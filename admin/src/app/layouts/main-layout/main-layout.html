<mat-sidenav-container class="layout">
  <mat-sidenav mode="side" opened class="layout__sidenav">
    <div class="layout__brand">
      <mat-icon>local_shipping</mat-icon>
      <span>ReturnLoad</span>
    </div>
    <mat-nav-list>
      @for (item of navItems(); track item.route) {
        <a mat-list-item [routerLink]="item.route" routerLinkActive="layout__link--active">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="layout__toolbar">
      <span>Operations Console</span>
    </mat-toolbar>
    <main class="layout__content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
